<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #111; }
        .login-container { background: white; padding: 40px; border-radius: 16px; border: 1px solid #eaeaea; box-shadow: 0 4px 24px rgba(0,0,0,0.02); width: 320px; text-align: center; }
        h2 { font-weight: 600; margin-bottom: 24px; font-size: 24px; letter-spacing: -0.5px;}
        input { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border: 1px solid #eaeaea; border-radius: 10px; background: #fafafa; font-size: 14px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #111; }
        button { background-color: #111; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 16px; font-size: 15px; font-weight: 500; transition: background 0.3s; }
        button:hover { background-color: #333; }
        .error { color: #e63946; margin-bottom: 15px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Acceso</h2>
        <div id="errorMsg" class="error"></div>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script>
        // ¡PON TU ENLACE REAL DE RENDER AQUÍ!
        const BACKEND_URL = 'https://tu-api.onrender.com'; 

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            fetch(`${BACKEND_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    localStorage.setItem('usuarioNombre', data.nombre);
                    window.location.href = 'principal.html';
                } else {
                    errorMsg.innerText = data.error;
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => console.error('Error:', err));
        });
    </script>
</body>
</html>
